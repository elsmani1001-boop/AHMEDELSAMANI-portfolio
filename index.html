<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Salah | Control & Automation Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Inter:wght@300;400;600&display=swap');

        :root {
            --primary: #00ffcc;
            --bg-dark: #050507;
            --panel-bg: rgba(10, 12, 18, 0.85);
            --grid-color: rgba(0, 255, 204, 0.03);
            --card-bg: rgba(16, 24, 48, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* 1. شريط التنقل العلوي الذكي (Navbar) المحدث بالترتيب الجديد */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: rgba(5, 5, 7, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 255, 204, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-logo img {
            height: 50px;
            width: 50px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .nav-logo span {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Orbitron', sans-serif;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }

        /* 2. الصفحة الأولى الأساسية (Hero Section) ذات الخلفية الحية المتغيرة */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .background-slideshow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transform: scale(1.05);
            transition: opacity 1.5s ease-in-out, transform 6s ease-in-out;
        }

        .slide.active {
            opacity: 0.35;
            transform: scale(1);
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

                linear-gradient(90deg, var(--grid-color) 1.5px, transparent 1.5px);
