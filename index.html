<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Ahmed Salah Portfolio</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        
        /* 1. اللوحة التعريفية (التي طلبتها في الصورة الثانية) */
        .hero-box { 
            max-width: 800px; margin: 100px auto 50px; 
            padding: 40px; border: 2px solid #00ffcc; 
            border-radius: 20px; text-align: center; background: rgba(0,0,0,0.8);
        }

        /* 2. قسم المشاريع */
        .projects-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; max-width: 1000px; margin: 0 auto 50px; padding: 20px;
        }
        .card { 
            padding: 20px; border: 1px solid #333; border-radius: 10px; 
            background: #111; text-align: center;
        }
    </style>
</head>
<body>

    <div class="hero-box">
        <img src="ahmad_elsamani_final_logo.jpg" style="width: 80px;">
        <h1>AHMED SALAH</h1>
        <p>CONTROL & AUTOMATION ENGINEER</p>
    </div>

    <div class="projects-grid">
        <div class="card"><h3>AUTOMATION</h3><p>تفاصيل الأتمتة...</p></div>
        <div class="card"><h3>IIoT</h3><p>تفاصيل الـ IoT...</p></div>
        <div class="card"><h3>EPLAN</h3><p>تفاصيل الـ EPLAN...</p></div>
    </div>

</body>
</html>
